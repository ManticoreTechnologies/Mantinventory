name: Publish v1.1.1 Release

on:
  push:
    branches:
      - cursor/fix-box-details-flicker-1c6e
    paths:
      - releases/mantinventory-v1.1.1-signed.apk
      - .github/workflows/publish-v1-1-1-release.yml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view v1.1.1 >/dev/null 2>&1; then
            gh release upload v1.1.1 releases/mantinventory-v1.1.1-signed.apk --clobber
          else
            gh release create v1.1.1 releases/mantinventory-v1.1.1-signed.apk --title "v1.1.1" --notes "Mantinventory v1.1.1 signed APK release."
          fi
